name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-condolivre-front
  cancel-in-progress: false

jobs:
  deploy:
    name: build and deploy to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # next build loads .env.production — NEXT_PUBLIC_API_URL is baked into the bundle.
        run: npm run build

      - name: Setup SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PRIVATE_KEY: ${{ secrets.PROD_PRIVATE_KEY }}
        run: |
          set -e
          [ -n "$PROD_HOST" ] || { echo "ERROR: secret PROD_HOST is empty"; exit 1; }
          [ -n "$PROD_USER" ] || { echo "ERROR: secret PROD_USER is empty"; exit 1; }
          [ -n "$PROD_PRIVATE_KEY" ] || { echo "ERROR: secret PROD_PRIVATE_KEY is empty"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$PROD_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH_TARGET=$PROD_USER@$PROD_HOST" >> "$GITHUB_ENV"

      - name: Sync build to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env.local' \
            ./ "$SSH_TARGET:/home/ubuntu/www/condolivre-front/"

      - name: Install deps and reload PM2
        run: |
          ssh "$SSH_TARGET" 'set -e; export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"; cd /home/ubuntu/www/condolivre-front && npm ci --omit=dev && (pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production) && pm2 save'

      - name: Cleanup SSH key
        if: always()
        run: rm -rf ~/.ssh
